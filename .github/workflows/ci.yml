name: CI - Build, Security Audit, and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    name: Build & TypeScript Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DishDash_Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: DishDash_Backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript build (typecheck)
        run: npm run build

  security-audit:
    name: Dependency Security Audit (SAST/SCA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DishDash_Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: DishDash_Backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  