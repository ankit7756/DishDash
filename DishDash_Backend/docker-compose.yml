services:
  mongodb:
    image: mongo:7
    container_name: dishdash-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: dishdash-backend
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - PORT=5050
      - MONGODB_URI=mongodb://mongodb:27017/dishdash
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - CLIENT_URL=${CLIENT_URL}
      - NODE_ENV=production
    depends_on:
      - mongodb

volumes:
  mongo_data:
